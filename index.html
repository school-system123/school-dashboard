<!DOCTYPE html>
<html>
<head>
  <title>School Dashboard System</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f4f8;
      margin: 0;
    }

    .header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 400px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #15803d;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>🏫 School Dashboard System</h2>
</div>

<div class="container">

  <div class="card">
    <h3>Teacher Homework Panel</h3>

    <input id="class" placeholder="Class (e.g 5-A)">
    <input id="subject" placeholder="Subject">
    <textarea id="homework" placeholder="Enter Homework"></textarea>

    <button onclick="sendHomework()">Send Homework</button>
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzN0J1CrBYzvKrwGfbuIgS-g5OBSEPerlkQ22C5UbRXSiZ1tw5t-AAKw-CZD5wJhIwS7Q/exec";

function sendHomework() {
  let cls = document.getElementById("class").value;
  let subject = document.getElementById("subject").value;
  let homework = document.getElementById("homework").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "homework",
      class: cls,
      subject: subject,
      homework: homework
    })
  })
  .then(res => res.text())
  .then(data => {
    alert("Homework Sent Successfully!");
    document.getElementById("class").value = "";
    document.getElementById("subject").value = "";
    document.getElementById("homework").value = "";
  })
  .catch(err => {
    alert("Error sending homework!");
  });
}

</script>

</body>
</html>
